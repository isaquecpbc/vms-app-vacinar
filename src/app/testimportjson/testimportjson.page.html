<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>
      TestImportJson
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">TestImportJson</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container">
    <ion-card class="card-sqlite">
      <ion-card-title>
        Results of refactor sqlite test
      </ion-card-title>
      <p class="sql-allsuccess" *ngIf="!showError">
        The set of tests was successful
      </p>
      <p class="sql-allfailure" *ngIf="showError">
        The set of tests failed
      </p>
    </ion-card>
  </div>
  <ion-button class="ion-padding" expand="block"
    (click)="createNew()">
    createNew
  </ion-button>
  <ion-button class="ion-padding" expand="block"
    (click)="updateRegistry()">
    updateRegistry
  </ion-button>
  <ion-button class="ion-padding" expand="block"
    (click)="exportRegistry()">
    exportRegistry
  </ion-button>
  <ion-item>
    <ion-label>exportValues</ion-label>
    <pre>
      {{exportValues}}
    </pre>
  </ion-item>

</ion-content>
