<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Local de Aplicação</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-progress-bar type="indeterminate" *ngIf="showLoading"></ion-progress-bar>
  <ion-grid>
    <ion-row color="light" class="ion-justify-content-center ion-align-items-center">
      <ion-col align-self-center size-md="6" size-lg="5" size-xs="12">
        <div>
          <h3 class="text-center">Insira o CEP do Local em que será realizado a Aplicação</h3>
        </div>
        <div padding>
          <ion-item>
            <ion-input name="cep" type="text" placeholder="CEP"
              ngModel required #formCep="ngModel"></ion-input>
          </ion-item>
        </div>
        <div padding>
          <ion-button size="large" type="button" expand="block" (click)="filterApply(formCep.value)">Buscar</ion-button>
        </div>
      </ion-col>
    </ion-row>
    <ion-row color="light" class="ion-justify-content-center ion-align-items-center" style="margin-top: .9em;">
      <ion-col align-self-center size-md="6" size-lg="5" size-xs="12">
          <ion-select placeholder="Selecione o local de Aplicação" [attr.disabled]="clinicas.length === 0">
            <ion-select-option *ngFor="let item of clinicas" [attr.value]="item.id">{{item.razao}}</ion-select-option>
          </ion-select>
          <div padding>
            <ion-button size="large" type="button" color="secondary" expand="block"
              [attr.disabled]="clinicas.length === 0" (click)="next(formCep.value)">Seguir</ion-button>
          </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>

<app-footer></app-footer>
