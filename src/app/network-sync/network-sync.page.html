<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Sincronização de dados</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-item>
    <ion-label>
      <h1>Ultima Sincronização</h1>
      <p>{{lastDtSync | date:'short'}}</p>
    </ion-label>
  </ion-item>

  <ion-item>
    <ion-label>
      <h1>Número do Patrimonio</h1>
      <p>{{storagePatrimonio}}</p>
    </ion-label>
  </ion-item>

  <ion-item>
    <ion-label>
      <h1>Verificação do banco</h1>
    </ion-label>
    <ion-spinner name="bubbles" *ngIf="!verifyLocalDB && !finishProcess"></ion-spinner>
    <ion-icon name="checkmark-outline" *ngIf="verifyLocalDB"></ion-icon>
    <ion-icon name="close-outline" *ngIf="!verifyLocalDB && finishProcess"></ion-icon>
  </ion-item>

  <ion-item>
    <ion-label>
      <h1>Enviando registros para o servidor</h1>
    </ion-label>
    <ion-spinner name="bubbles" *ngIf="!finishProcess || !verifySendChanges"></ion-spinner>
    <ion-icon name="checkmark-outline" *ngIf="verifySendChanges"></ion-icon>
    <!-- <ion-icon name="close-outline" *ngIf="!finishProcess"></ion-icon> -->
  </ion-item>

  <ion-grid>
    <ion-row>
      <ion-col>
        <ion-button size="large" expand="block"
          (click)="next()"
          [disabled]="!(verifyLocalDB && !hasError)">
          Seguir
        </ion-button>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-item>
        <ion-label>LOG de sincronização</ion-label>
        <pre>{{log}}</pre>
      </ion-item>
    </ion-row>
  </ion-grid>
</ion-content>
