<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Realizar Aplicação</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-item>
    <ion-label>
      <h1 style="text-align: center;">Encontre o participante</h1>
      <p>Pesquise por: Nome, Matricula, CPF ou Token</p>
    </ion-label>
  </ion-item>

  <ion-searchbar [debounce]="1000" (ionChange)="handleChange($event)"></ion-searchbar>

  <ion-list>
    <ion-item *ngFor="let result of results" (click)="apply(result)">
      <ion-label>
        <h1>{{ result }}</h1>
        <p><b>CPF:</b> XXX.XXX.XXX-XX; <b>MATRICULA:</b> XXXXXXXXXX</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>

<app-footer></app-footer>
