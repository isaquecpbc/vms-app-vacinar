<ion-footer>
  <ion-toolbar>
    <ion-grid>
      <ion-row>
        <ion-col size="auto">
          <ion-icon [ngClass]="{'conected': isConnected}" name="radio-button-on-outline"></ion-icon>
        </ion-col>
        <ion-col>
          <ion-title *ngIf="isConnected; else isOffline">ON-LINE</ion-title>
          <ng-template #isOffline>
            <ion-title >DD/MM/YYYY HH:II:SS</ion-title>
          </ng-template>
        </ion-col>
        <ion-col>
          <!-- <ion-title>{{isLogged ? 'AUTH' : 'NOK'}}</ion-title> -->
          <ion-title>{{networkStatus | json}}</ion-title>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-toolbar>
</ion-footer>
